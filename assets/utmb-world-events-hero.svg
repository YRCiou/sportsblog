<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0a1628"/>
      <stop offset="55%"  stop-color="#0f2a4a"/>
      <stop offset="100%" stop-color="#071830"/>
    </linearGradient>
    <!-- Globe glow -->
    <radialGradient id="globeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#22d3ee" stop-opacity="0.12"/>
      <stop offset="70%"  stop-color="#22d3ee" stop-opacity="0.03"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <!-- Taiwan glow -->
    <radialGradient id="tpeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#f59e0b" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0"/>
    </radialGradient>
    <!-- Clip to globe -->
    <clipPath id="globeClip">
      <circle cx="840" cy="315" r="258"/>
    </clipPath>
    <!-- Dot pattern -->
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1" fill="#22d3ee" fill-opacity="0.07"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Subtle dot grid over whole canvas -->
  <rect width="1200" height="630" fill="url(#dots)"/>

  <!-- ── Globe ─────────────────────────────────────────────── -->
  <!-- Glow behind globe -->
  <circle cx="840" cy="315" r="300" fill="url(#globeGlow)"/>

  <!-- Latitude lines -->
  <g fill="none" stroke="#22d3ee" stroke-opacity="0.13" stroke-width="1">
    <ellipse cx="840" cy="315" rx="258" ry="258"/>
    <ellipse cx="840" cy="315" rx="258" ry="194"/>
    <ellipse cx="840" cy="315" rx="258" ry="120"/>
    <ellipse cx="840" cy="315" rx="258" ry="45"/>
    <line x1="582" y1="315" x2="1098" y2="315"/>
  </g>
  <!-- Longitude lines -->
  <g fill="none" stroke="#22d3ee" stroke-opacity="0.1" stroke-width="1">
    <ellipse cx="840" cy="315" rx="64"  ry="258"/>
    <ellipse cx="840" cy="315" rx="130" ry="258"/>
    <ellipse cx="840" cy="315" rx="194" ry="258"/>
    <line x1="840" y1="57" x2="840" y2="573"/>
  </g>

  <!-- Bright globe rim -->
  <circle cx="840" cy="315" r="258" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-opacity="0.35"/>

  <!-- ── Simplified continent blobs (inside globe clip) ────── -->
  <g clip-path="url(#globeClip)" fill="#22d3ee" fill-opacity="0.07">
    <!-- Europe -->
    <path d="M790 200 Q820 185 850 195 Q870 205 855 225 Q835 235 810 228 Q788 220 790 200Z"/>
    <!-- Asia main -->
    <path d="M855 175 Q920 165 970 185 Q1000 200 990 230 Q960 250 920 245 Q885 240 860 225 Q842 210 855 175Z"/>
    <!-- Africa -->
    <path d="M800 265 Q825 255 845 268 Q860 285 852 330 Q840 365 820 370 Q800 365 792 340 Q782 305 800 265Z"/>
    <!-- Americas (partial) -->
    <path d="M635 220 Q660 215 670 235 Q675 255 660 270 Q642 275 632 258 Q625 238 635 220Z"/>
    <path d="M640 295 Q660 290 665 310 Q668 335 655 355 Q638 365 628 345 Q618 318 640 295Z"/>
    <!-- Australia -->
    <path d="M960 355 Q990 348 1005 365 Q1012 385 998 400 Q978 408 962 398 Q948 382 960 355Z"/>
    <!-- Japan -->
    <path d="M970 210 Q980 205 988 212 Q993 222 985 230 Q975 233 968 224 Q963 216 970 210Z"/>
  </g>

  <!-- ── Flight arcs from Taiwan ────────────────────────────── -->
  <!-- Taiwan position on globe (approx 120°E 23°N projected) -->
  <!-- Taiwan dot: cx≈975, cy≈248 on this globe -->
  <g fill="none" stroke="#f59e0b" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="4 4">
    <!-- To Europe (Chamonix, France) ~830,215 -->
    <path d="M968 248 Q900 160 828 212"/>
    <!-- To Australia (Sydney) ~1005 370 -->
    <path d="M968 248 Q1010 300 1000 368"/>
    <!-- To Americas (Sacramento) ~635 245 -->
    <path d="M968 248 Q840 180 660 240"/>
    <!-- To Japan (close, short arc) ~985 225 -->
    <path d="M968 248 Q978 232 982 218"/>
    <!-- To Thailand (Betong) ~918 310 -->
    <path d="M968 248 Q948 280 916 308"/>
    <!-- To South Korea ~970 210 -->
    <path d="M968 248 Q970 228 973 215"/>
  </g>

  <!-- ── Event location dots ────────────────────────────────── -->
  <g>
    <!-- Chamonix, France (UTMB Mont-Blanc) - Major -->
    <circle cx="828" cy="212" r="5" fill="#f59e0b" fill-opacity="0.9"/>
    <circle cx="828" cy="212" r="10" fill="#f59e0b" fill-opacity="0.2"/>
    <!-- Grindelwald, Switzerland -->
    <circle cx="838" cy="215" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Vielha, Spain - Major -->
    <circle cx="814" cy="220" r="5" fill="#f59e0b" fill-opacity="0.9"/>
    <circle cx="814" cy="220" r="10" fill="#f59e0b" fill-opacity="0.15"/>
    <!-- Cortina, Italy -->
    <circle cx="848" cy="218" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Garmisch, Germany -->
    <circle cx="843" cy="208" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Katoomba, Australia - Major -->
    <circle cx="1000" cy="370" r="5" fill="#f59e0b" fill-opacity="0.9"/>
    <circle cx="1000" cy="370" r="10" fill="#f59e0b" fill-opacity="0.2"/>
    <!-- Auburn CA / Western States -->
    <circle cx="630" cy="242" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Whistler Canada -->
    <circle cx="615" cy="218" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Quebec Canada -->
    <circle cx="668" cy="225" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Hong Kong -->
    <circle cx="968" cy="268" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Japan (Yamanaka) -->
    <circle cx="984" cy="222" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- South Korea -->
    <circle cx="976" cy="214" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Thailand -->
    <circle cx="915" cy="308" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Indonesia Lake Toba -->
    <circle cx="930" cy="322" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- George South Africa -->
    <circle cx="835" cy="398" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Chile -->
    <circle cx="670" cy="430" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Ecuador -->
    <circle cx="645" cy="318" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
    <!-- Croatia -->
    <circle cx="847" cy="205" r="3.5" fill="#22d3ee" fill-opacity="0.85"/>
  </g>

  <!-- Taiwan origin - bright gold star -->
  <circle cx="968" cy="248" r="18" fill="url(#tpeGlow)"/>
  <circle cx="968" cy="248" r="6"  fill="#f59e0b"/>
  <circle cx="968" cy="248" r="3"  fill="#fff"/>
  <!-- TPE label -->
  <text x="980" y="244" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#f59e0b" font-weight="700">TPE</text>

  <!-- ── Left side typography ───────────────────────────────── -->
  <!-- Overline -->
  <rect x="80" y="152" width="40" height="3" rx="1.5" fill="#22d3ee"/>

  <!-- Main title -->
  <text font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="800">
    <tspan x="80" y="210" font-size="68" fill="#ffffff" letter-spacing="-1">UTMB</tspan>
  </text>
  <text font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="800">
    <tspan x="80" y="278" font-size="42" fill="#e2e8f0">世界系列賽</tspan>
  </text>
  <text font-family="system-ui,-apple-system,'Segoe UI',sans-serif" font-weight="700">
    <tspan x="80" y="328" font-size="36" fill="#22d3ee">行事曆</tspan>
  </text>

  <!-- Divider -->
  <line x1="80" y1="355" x2="480" y2="355" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Subtitle -->
  <text font-family="system-ui,-apple-system,sans-serif" font-weight="500">
    <tspan x="80" y="388" font-size="20" fill="#94a3b8">從</tspan>
    <tspan font-size="20" fill="#f59e0b" font-weight="700"> 台灣桃園 TPE </tspan>
    <tspan font-size="20" fill="#94a3b8">出發</tspan>
  </text>
  <text font-family="system-ui,-apple-system,sans-serif" font-weight="400">
    <tspan x="80" y="416" font-size="18" fill="#64748b">最低來回機票 · 每日自動更新</tspan>
  </text>

  <!-- Badge row -->
  <!-- Badge 1: 日期排序 -->
  <rect x="80"  y="450" width="110" height="32" rx="6" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1"/>
  <text x="135" y="471" font-family="system-ui,sans-serif" font-size="13" fill="#22d3ee" font-weight="600" text-anchor="middle">日期排序</text>
  <!-- Badge 2: 價格排序 -->
  <rect x="202" y="450" width="110" height="32" rx="6" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1"/>
  <text x="257" y="471" font-family="system-ui,sans-serif" font-size="13" fill="#22d3ee" font-weight="600" text-anchor="middle">價格排序</text>
  <!-- Badge 3: 世界地圖 -->
  <rect x="324" y="450" width="110" height="32" rx="6" fill="#22d3ee" fill-opacity="0.15" stroke="#22d3ee" stroke-opacity="0.4" stroke-width="1"/>
  <text x="379" y="471" font-family="system-ui,sans-serif" font-size="13" fill="#22d3ee" font-weight="600" text-anchor="middle">世界地圖</text>

  <!-- Bottom: site name -->
  <text x="80" y="565" font-family="system-ui,sans-serif" font-size="14" fill="#475569" font-weight="500">YR 運動研究室 · yrciou.github.io/sportsblog</text>
</svg>
