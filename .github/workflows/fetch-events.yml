name: 每日更新 UTMB 賽事與機票資料

on:
  schedule:
    # 每天台灣時間凌晨 3 點執行（UTC 19:00）
    - cron: '0 19 * * *'
  workflow_dispatch:
    # 允許手動觸發

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout 程式碼
        uses: actions/checkout@v4

      - name: 設定 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 執行賽事與機票抓取腳本
        env:
          TRAVELPAYOUTS_TOKEN: ${{ secrets.TRAVELPAYOUTS_TOKEN }}
        run: node scripts/fetch-events.js

      - name: 檢查是否有資料異動
        id: check-changes
        run: |
          if git diff --quiet data/events.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit 並 Push 更新的資料
        if: steps.check-changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/events.json
          git commit -m "chore: 自動更新 UTMB 賽事與機票資料 [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
